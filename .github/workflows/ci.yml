name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Stub workspace-only dependencies so `pnpm install` can resolve
      # `workspace:*` protocols without checking out external repos.
      # The stub must export every symbol used by viewers source, with
      # signatures compatible enough for `tsc --noEmit` under strict mode.
      - name: Stub workspace dependencies
        run: |
          mkdir -p .stub/tokimo-ui
          echo '{"name":"@tokimo/ui","version":"0.0.0","main":"index.ts","types":"index.ts"}' > .stub/tokimo-ui/package.json
          cat > .stub/tokimo-ui/index.ts << 'EOF'
          /* CI stub — real implementations live in @tokimo/ui */
          /* biome-ignore-all lint/suspicious/noExplicitAny: stub */
          const noop: any = () => null;
          export const Spin: any = noop;
          export const ScrollArea: any = noop;
          export const Button: any = noop;
          export const Markdown: any = noop;
          export function SegmentedControl<T extends string>(_props: {
            value: T;
            onChange: (v: T) => void;
            options: ReadonlyArray<{ value: T; label: unknown }>;
          }): any {
            return null;
          }
          EOF
          cat > pnpm-workspace.yaml << 'EOF'
          packages:
            - "."
            - ".stub/*"
          EOF

      # tsconfig extends `../../tsconfig.base.json` (monorepo layout).
      # In a standalone clone the checkout sits at
      # `/home/runner/work/<repo>/<repo>`, so `../../` resolves to
      # `/home/runner/work/` — synthesize the base file there.
      - name: Provide monorepo tsconfig.base.json
        run: |
          cat > ../../tsconfig.base.json << 'EOF'
          {
            "compilerOptions": {
              "target": "ES2022",
              "lib": ["ES2022", "DOM"],
              "moduleResolution": "Node",
              "resolveJsonModule": true,
              "esModuleInterop": true,
              "skipLibCheck": true,
              "forceConsistentCasingInFileNames": true,
              "strict": true,
              "experimentalDecorators": true,
              "emitDecoratorMetadata": true
            }
          }
          EOF

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
